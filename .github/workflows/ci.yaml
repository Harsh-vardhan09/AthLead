name: monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  frontend-format:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Athlead-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Athlead-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run format
        run: npm run format

  frontend-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Athlead-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Athlead-client/package-lock.json

      - run: npm ci

      - run: npm run lint

  backend-format:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - run: npm ci

      - run: npm run format

  backend-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - run: npm ci

      - run: npm run lint