name: CI checks for repo

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  code-format:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20

        - run: npm ci
          working-directory: Athlead-client

        - run: npm ci
          working-directory: Backend

        - name: npm run format
          run: npm run format

        - name: npm run lint
          run: npm run lint